<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tableau Widget</title>
    <style>
      :root {
        --bg: #0b0c10;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --border: rgba(255, 255, 255, 0.14);
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 600px at 20% 0%, rgba(80, 180, 255, 0.25), transparent 60%),
          radial-gradient(900px 500px at 90% 10%, rgba(240, 120, 255, 0.22), transparent 55%),
          var(--bg);
        color: var(--text);
      }
      .wrap {
        padding: 14px;
      }
      .header {
        display: flex;
        gap: 12px;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.1px;
      }
      .sub {
        margin-top: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      .badge {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        white-space: nowrap;
      }
      .card {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.4);
      }
      iframe {
        width: 100%;
        height: 720px;
        border: 0;
        display: block;
        background: rgba(0, 0, 0, 0.15);
      }
      .empty {
        padding: 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div>
          <div class="title" id="title">Tableau 차트</div>
          <div class="sub" id="sub">차트를 불러오는 중...</div>
        </div>
        <div class="badge" id="badge">Tableau Public</div>
      </div>

      <div class="card" id="card">
        <iframe id="viz" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
        <div class="empty" id="empty" style="display: none">
          Tableau URL이 비어있습니다.<br />
          <br />
          - <code>tableau-views.json</code>의 <code>default.url</code>을 설정하거나<br />
          - 환경변수 <code>TABLEAU_DEFAULT_URL</code>을 지정해주세요.
        </div>
      </div>
    </div>

    <script>
      const els = {
        title: document.getElementById("title"),
        sub: document.getElementById("sub"),
        iframe: document.getElementById("viz"),
        empty: document.getElementById("empty")
      };

      const render = (toolResult) => {
        const payload = toolResult?.structuredContent ?? {};
        const title = payload.title || "Tableau 차트";
        const tableauUrl = payload.tableauUrl || "";
        const question = payload.question || "";

        els.title.textContent = title;
        els.sub.textContent = question ? `질문: ${question}` : "Tableau Public 차트가 표시됩니다.";

        if (!tableauUrl) {
          els.iframe.style.display = "none";
          els.empty.style.display = "block";
          return;
        }

        els.empty.style.display = "none";
        els.iframe.style.display = "block";
        els.iframe.src = tableauUrl;
      };

      els.sub.textContent = "차트를 불러오는 중...";

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) return;
          const msg = event.data;
          if (!msg || msg.jsonrpc !== "2.0") return;
          if (msg.method !== "ui/notifications/tool-result") return;
          render(msg.params);
        },
        { passive: true }
      );
    </script>
  </body>
</html>
