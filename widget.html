<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tableau Widget</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: transparent;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <iframe id="viz" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>

    <script>
      const iframe = document.getElementById("viz");

      const render = (toolResult) => {
        const payload = toolResult?.structuredContent ?? {};
        const tableauUrl = payload.tableauUrl || "";
        if (!tableauUrl) return;
        iframe.src = tableauUrl;
      };

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) return;
          const msg = event.data;
          if (!msg || msg.jsonrpc !== "2.0") return;
          if (msg.method !== "ui/notifications/tool-result") return;
          render(msg.params);
        },
        { passive: true }
      );
    </script>
  </body>
</html>
